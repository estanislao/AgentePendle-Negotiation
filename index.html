<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Especificação de Arquitetura - Aba Negociações (PT Only)</title>
    <style>
        :root {
            --bg-main: #f4f6fa;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --primary: #2563eb;
            --primary-dark: #090d16;
            --accent: #0ea5e9;
            --accent-light: #f0f9ff;
            --border: #e2e8f0;
            --zebra: #f8fafc;
            --math-bg: #f1f5f9;
            --code-bg: #0b0f19;
            --code-text: #f1f5f9;
            --state-alert: #e11d48;
            --state-success: #16a34a;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            line-height: 1.6; 
            color: var(--text-main); 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 40px 24px;
            background-color: var(--bg-main);
        }
        
        .header-banner {
            background-color: var(--primary-dark);
            color: #ffffff;
            padding: 35px 40px;
            border-radius: 8px;
            border-bottom: 4px solid var(--primary);
            margin-bottom: 35px;
        }

        .header-banner h1 { margin: 0 0 10px 0; font-size: 24px; font-weight: 700; }
        .header-banner .subtitle { font-size: 11px; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }

        h2 { color: var(--primary-dark); margin-top: 40px; border-bottom: 2px solid var(--border); padding-bottom: 8px; font-size: 20px; }
        h3 { color: var(--primary); margin-top: 25px; font-size: 16px; }
